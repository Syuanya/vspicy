server:
  port: 18087
  max-http-request-header-size: ${VSPICY_MAX_HTTP_REQUEST_HEADER_SIZE:64KB}

spring:
  application:
    name: vspicy-recommend
  datasource:
    url: ${VSPICY_DB_URL:jdbc:mysql://${VSPICY_DB_HOST:127.0.0.1}:${VSPICY_DB_PORT:3306}/${VSPICY_DB_NAME:vspicy}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000}
    username: ${VSPICY_DB_USERNAME:vspicy}
    password: ${VSPICY_DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${VSPICY_REDIS_HOST:127.0.0.1}
      port: ${VSPICY_REDIS_PORT:6379}
      password: ${VSPICY_REDIS_PASSWORD:redis123456}
      database: ${VSPICY_REDIS_DATABASE:0}
      timeout: ${VSPICY_REDIS_TIMEOUT:3000ms}
  cloud:
    nacos:
      discovery:
        server-addr: ${VSPICY_NACOS_SERVER_ADDR:127.0.0.1:8848}

vspicy:
  recommend:
    cache:
      enabled: true
      feed-ttl-seconds: 60
      hot-ttl-seconds: 120
      similar-ttl-seconds: 300
      stale-ttl-seconds: 1800
