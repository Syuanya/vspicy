server:
  port: 18080
  max-http-request-header-size: ${VSPICY_MAX_HTTP_REQUEST_HEADER_SIZE:64KB}

spring:
  application:
    name: vspicy-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${VSPICY_NACOS_SERVER_ADDR:127.0.0.1:8848}
    gateway:
      routes:
        - id: vspicy-auth
          uri: http://localhost:18081
          predicates:
            - Path=/api/auth/**
        - id: vspicy-auth-compat
          uri: http://localhost:18081
          predicates:
            - Path=/auth/**
        - id: vspicy-user
          uri: http://localhost:18082
          predicates:
            - Path=/api/users/**
        - id: vspicy-file
          uri: http://localhost:18083
          predicates:
            - Path=/api/files/**
        - id: vspicy-video
          uri: http://localhost:18084
          predicates:
            - Path=/api/videos/**
        - id: vspicy-content-article
          uri: http://localhost:18085
          predicates:
            - Path=/api/articles/**
        - id: vspicy-content-audit
          uri: http://localhost:18085
          predicates:
            - Path=/api/audit/**
        - id: vspicy-interaction
          uri: http://localhost:18086
          predicates:
            - Path=/api/interactions/**
        - id: vspicy-recommend
          uri: http://localhost:18087
          predicates:
            - Path=/api/recommend/**
        - id: vspicy-profile
          uri: http://localhost:18088
          predicates:
            - Path=/api/profiles/**
        - id: vspicy-dashboard
          uri: http://localhost:18089
          predicates:
            - Path=/api/dashboard/**
        - id: vspicy-admin
          uri: http://localhost:18090
          predicates:
            - Path=/api/admin/**
        - id: vspicy-notification
          uri: http://localhost:18091
          predicates:
            - Path=/api/notifications/**
        - id: vspicy-member
          uri: http://localhost:18092
          predicates:
            - Path=/api/members/**

vspicy:
  jwt:
    secret: ${VSPICY_JWT_SECRET:vspicy-local-dev-jwt-secret-2026-04-30}
  gateway:
    auth:
      enabled: true
      dev-bypass-enabled: ${VSPICY_GATEWAY_DEV_BYPASS:false}
      default-user-id: 1
      default-username: dev-admin
      default-roles:
        - SUPER_ADMIN
      default-permissions:
        - '*'
      whitelist:
        - /api/auth/**
        - /api/**/health
        - /api/members/plans
        - /api/notifications/announcements
        - /api/videos/*/play
        - /api/videos/*/play-info
        - /api/videos/*/hls/**
        - /api/videos/playback/readiness/**
        - /api/articles/**
        - /api/interactions/**
        - /api/recommend/**
        - /api/dashboard/**
        - /api/profiles/**
      permission-rules:
        # user service
        - path: /api/users/**
          methods: [PUT, POST, DELETE]
          permission: user:manage
        - path: /api/users/**
          methods: [GET]
          permission: user:view

        # video/content base rules
        - path: /api/videos/**
          methods: [PUT, DELETE]
          permission: content:manage
        # content safety: sensitive words, keep before broader /api/audit/**
        - path: /api/audit/sensitive-words/test
          methods: [POST]
          permission: content:sensitive:test
        - path: /api/audit/sensitive-words/*/enable
          methods: [POST]
          permission: content:sensitive:manage
        - path: /api/audit/sensitive-words/*/disable
          methods: [POST]
          permission: content:sensitive:manage
        - path: /api/audit/sensitive-words/**
          methods: [GET]
          permission: content:sensitive:view
        - path: /api/audit/sensitive-words/**
          methods: [POST, PUT]
          permission: content:sensitive:manage
        - path: /api/audit/sensitive-words/**
          methods: [DELETE]
          permission: content:sensitive:delete

        - path: /api/audit/**
          methods: [GET, POST, PUT, DELETE]
          permission: content:audit:view

        # admin: login security, keep before broader /api/admin/**
        - path: /api/admin/login-security/sessions/*/kick
          methods: [POST]
          permission: login:security:kick
        - path: /api/admin/login-security/sessions/cleanup-expired
          methods: [POST]
          permission: login:security:cleanup
        - path: /api/admin/login-security/**
          methods: [GET]
          permission: login:security:view

        # admin: system jobs
        - path: /api/admin/jobs/*/run
          methods: [POST]
          permission: system:job:run
        - path: /api/admin/jobs/logs
          methods: [GET]
          permission: system:job:log:view
        - path: /api/admin/jobs/**
          methods: [GET]
          permission: system:job:view
        - path: /api/admin/jobs/**
          methods: [POST, PUT, DELETE]
          permission: system:job:manage

        # admin: system monitor
        - path: /api/admin/system-monitor/**
          methods: [GET]
          permission: system:monitor:view

        # admin: service diagnostics
        - path: /api/admin/service-diagnostics/**
          methods: [GET]
          permission: system:diagnostics:view

        # admin: organization
        - path: /api/admin/org/users/*
          methods: [POST]
          permission: system:org:user
        - path: /api/admin/org/**
          methods: [GET]
          permission: system:org:view
        - path: /api/admin/org/**
          methods: [POST, PUT, DELETE]
          permission: system:org:manage

        # admin: system menu
        - path: /api/admin/menus/roles/*
          methods: [POST]
          permission: system:menu:role
        - path: /api/admin/menus/**
          methods: [GET]
          permission: system:menu:view
        - path: /api/admin/menus/**
          methods: [POST, PUT, DELETE]
          permission: system:menu:manage

        # admin: RBAC permission center
        - path: /api/admin/roles/*/enable
          methods: [POST]
          permission: permission:role:status
        - path: /api/admin/roles/*/disable
          methods: [POST]
          permission: permission:role:status
        - path: /api/admin/roles/*/permission-summary
          methods: [GET]
          permission: permission:view
        - path: /api/admin/roles/**
          methods: [GET]
          permission: permission:view
        - path: /api/admin/roles/**
          methods: [POST, PUT, DELETE]
          permission: permission:manage
        - path: /api/admin/permissions/*/enable
          methods: [POST]
          permission: permission:permission:status
        - path: /api/admin/permissions/*/disable
          methods: [POST]
          permission: permission:permission:status
        - path: /api/admin/permissions/**
          methods: [GET]
          permission: permission:view
        - path: /api/admin/permissions/**
          methods: [POST, PUT, DELETE]
          permission: permission:manage

        # admin: system dictionaries
        - path: /api/admin/dictionaries/**
          methods: [GET]
          permission: system:dict:view
        - path: /api/admin/dictionaries/**
          methods: [POST, PUT, DELETE]
          permission: system:dict:manage

        # admin: system configs
        - path: /api/admin/system-configs/**
          methods: [GET]
          permission: system:config:view
        - path: /api/admin/system-configs/**
          methods: [POST, PUT, DELETE]
          permission: system:config:manage


        # admin: system exception logs
        - path: /api/admin/exception-logs/cleanup
          methods: [POST]
          permission: system:exception:cleanup
        - path: /api/admin/exception-logs/*/resolve
          methods: [POST]
          permission: system:exception:handle
        - path: /api/admin/exception-logs/*/ignore
          methods: [POST]
          permission: system:exception:handle
        - path: /api/admin/exception-logs/*/reopen
          methods: [POST]
          permission: system:exception:handle
        - path: /api/admin/exception-logs/**
          methods: [GET]
          permission: system:exception:view
        - path: /api/admin/exception-logs/**
          methods: [DELETE]
          permission: system:exception:delete

        # admin: operation logs
        - path: /api/admin/operation-logs/export
          methods: [GET]
          permission: operation:log:export
        - path: /api/admin/operation-logs/cleanup
          methods: [POST]
          permission: operation:log:cleanup
        - path: /api/admin/operation-logs/**
          methods: [GET]
          permission: operation:log:view

        # member
        - path: /api/members/me
          methods: [GET]
          permission: AUTHENTICATED
        - path: /api/members/benefits
          methods: [GET]
          permission: AUTHENTICATED
        - path: /api/members/check/**
          methods: [GET]
          permission: AUTHENTICATED
        - path: /api/members/cancel
          methods: [POST]
          permission: AUTHENTICATED

        - path: /api/members/subscribe
          methods: [POST]
          permission: member:subscribe
        - path: /api/members/**
          methods: [GET, POST, PUT, DELETE]
          permission: member:view

        # notification self-service
        - path: /api/notifications/stream
          methods: [GET]
          permission: AUTHENTICATED
        - path: /api/notifications/inbox
          methods: [GET]
          permission: AUTHENTICATED
        - path: /api/notifications/inbox/**
          methods: [GET, POST, DELETE]
          permission: AUTHENTICATED
        - path: /api/notifications/unread-count
          methods: [GET]
          permission: AUTHENTICATED
        - path: /api/notifications/preferences/**
          methods: [GET, POST, PUT, DELETE]
          permission: AUTHENTICATED

        # notification admin inbox and overview
        - path: /api/notifications/admin/inbox
          methods: [GET]
          permission: notification:inbox:admin:view
        - path: /api/notifications/admin/inbox/**
          methods: [GET]
          permission: notification:inbox:admin:view
        - path: /api/notifications/admin/users/*/inbox-summary
          methods: [GET]
          permission: notification:inbox:admin:view
        - path: /api/notifications/admin/overview
          methods: [GET]
          permission: notification:overview:view

        # notification templates
        - path: /api/notifications/templates/publish-logs/*/retry
          methods: [POST]
          permission: notification:template:publish
        - path: /api/notifications/templates/publish-logs/**
          methods: [GET]
          permission: notification:template:log:view
        - path: /api/notifications/templates/*/publish
          methods: [POST]
          permission: notification:template:publish
        - path: /api/notifications/templates/*/publish-check
          methods: [POST]
          permission: notification:template:publish
        - path: /api/notifications/templates/*/preview
          methods: [POST]
          permission: notification:template:view
        - path: /api/notifications/templates/*/validate
          methods: [POST]
          permission: notification:template:view
        - path: /api/notifications/templates/*/copy
          methods: [POST]
          permission: notification:template:manage
        - path: /api/notifications/templates/**
          methods: [GET]
          permission: notification:template:view
        - path: /api/notifications/templates/**
          methods: [POST, PUT, DELETE]
          permission: notification:template:manage

        # notification events and user notification center
        - path: /api/notifications/system
          methods: [POST]
          permission: notification:publish
        - path: /api/notifications/events/**
          methods: [POST]
          permission: notification:publish
        - path: /api/notifications/event-logs/*/retry
          methods: [POST]
          permission: notification:event:retry
        - path: /api/notifications/event-logs/**
          methods: [GET]
          permission: notification:event:view
        - path: /api/notifications/**
          methods: [GET, POST, PUT, DELETE]
          permission: notification:view

        # video ops
        - path: /api/videos/transcode/**
          methods: [GET, POST, PUT, DELETE]
          permission: video:transcode:view
        - path: /api/videos/upload/quota/**
          methods: [GET, POST, PUT, DELETE]
          permission: video:upload:quota:view
        - path: /api/videos/storage/**
          methods: [GET, POST, PUT, DELETE]
          permission: video:storage:ops:view
        - path: /api/videos/hls/**
          methods: [GET, POST, PUT, DELETE]
          permission: video:hls:repair:view

        # fallback admin rule, keep last among /api/admin/** rules
        - path: /api/admin/**
          methods: [GET, POST, PUT, DELETE]
          permission: permission:view

        # admin: system releases
        - path: /api/admin/releases/**
          methods: [GET]
          permission: system:release:view
        - path: /api/admin/releases/**
          methods: [POST, PUT]
          permission: system:release:manage
        - path: /api/admin/releases/**
          methods: [DELETE]
          permission: system:release:delete
