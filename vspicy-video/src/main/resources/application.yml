server:
  port: 18084
  max-http-request-header-size: ${VSPICY_MAX_HTTP_REQUEST_HEADER_SIZE:64KB}

spring:
  application:
    name: vspicy-video
  servlet:
    multipart:
      enabled: true
      max-file-size: ${VSPICY_VIDEO_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${VSPICY_VIDEO_MULTIPART_MAX_REQUEST_SIZE:60MB}
      file-size-threshold: ${VSPICY_VIDEO_MULTIPART_FILE_SIZE_THRESHOLD:2MB}
  datasource:
    url: ${VSPICY_DB_URL:jdbc:mysql://${VSPICY_DB_HOST:127.0.0.1}:${VSPICY_DB_PORT:3306}/${VSPICY_DB_NAME:vspicy}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000}
    username: ${VSPICY_DB_USERNAME:root}
    password: ${VSPICY_DB_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
      maximum-pool-size: 10
      minimum-idle: 2
  cloud:
    nacos:
      discovery:
        server-addr: ${VSPICY_NACOS_SERVER_ADDR:127.0.0.1:8848}

rocketmq:
  name-server: ${VSPICY_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: vspicy-video-producer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# 兼容旧版代码可能读取 minio.*
minio:
  endpoint: ${VSPICY_MINIO_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${VSPICY_MINIO_ACCESS_KEY:vspicy}
  secret-key: ${VSPICY_MINIO_SECRET_KEY:vspicy123456}
  bucket: ${VSPICY_MINIO_BUCKET:vspicy}
  bucket-name: ${VSPICY_MINIO_BUCKET:vspicy}
  public-endpoint: ${VSPICY_MINIO_PUBLIC_ENDPOINT:${VSPICY_MINIO_ENDPOINT:http://127.0.0.1:9000}}
  public-base-url: ${VSPICY_MINIO_PUBLIC_BASE_URL:${VSPICY_MINIO_ENDPOINT:http://127.0.0.1:9000}/${VSPICY_MINIO_BUCKET:vspicy}}
  region: us-east-1
  secure: false

video:
  storage:
    origin-dir: D:/workspace/vspicy/media/origin
    hls-dir: D:/workspace/vspicy/media/hls
    tmp-dir: D:/workspace/vspicy/tmp
    temp-root: D:/workspace/vspicy/tmp
    tmp-root: D:/workspace/vspicy/tmp
    merged-dir: D:/workspace/vspicy/media/merged
    merged-root: D:/workspace/vspicy/media/merged
    merge-root: D:/workspace/vspicy/media/merged
    origin-root: D:/workspace/vspicy/media/origin
    hls-root: D:/workspace/vspicy/media/hls
    public-base-url: ${VSPICY_MINIO_PUBLIC_BASE_URL:${VSPICY_MINIO_ENDPOINT:http://127.0.0.1:9000}/${VSPICY_MINIO_BUCKET:vspicy}}
    hls-url-prefix: ${VSPICY_HLS_URL_PREFIX:${VSPICY_MINIO_ENDPOINT:http://127.0.0.1:9000}/${VSPICY_MINIO_BUCKET:vspicy}/videos}
    bucket: ${VSPICY_MINIO_BUCKET:vspicy}
    public-endpoint: ${VSPICY_MINIO_PUBLIC_ENDPOINT:${VSPICY_MINIO_ENDPOINT:http://127.0.0.1:9000}}
    ffmpeg-path: ffmpeg
    ffprobe-path: ffprobe
    segment-seconds: 6
    hls-segment-seconds: 6
    hls-playlist-name: index.m3u8
  transcode:
    enabled: true
    rocket-mq: ${VSPICY_VIDEO_TRANSCODE_ROCKET_MQ:false}
    rocketmq: ${VSPICY_VIDEO_TRANSCODE_ROCKETMQ:false}
    send-timeout-ms: ${VSPICY_ROCKETMQ_SEND_TIMEOUT_MS:3000}
    topic: vspicy-video-transcode-topic
    transcode-topic: vspicy-video-transcode-topic
    retry-topic: vspicy-video-transcode-retry-topic
    tag: TRANSCODE
    consumer-group: vspicy-video-transcode-consumer
    producer-group: vspicy-video-producer
    ffmpeg-path: ffmpeg
    ffprobe-path: ffprobe
    segment-seconds: 6
    hls-segment-seconds: 6
    hls-playlist-name: index.m3u8
    overwrite: true
    delete-origin-after-transcode: false
    max-retry-count: 3
    input-format: mp4
    output-format: hls
    video-codec: libx264
    audio-codec: aac
    preset: veryfast
    crf: "23"
    resolution: 720p
    timeout-seconds: 3600
    compensation:
      enabled: true
      fixed-delay-ms: 60000
      initial-delay-ms: 30000
      scan-limit: 20
      limit: 20
      batch-size: 20
      pending-limit: 20
      processing-limit: 20
      running-limit: 20
      failed-limit: 20
      dead-limit: 20
      compensate-limit: 20
      max-retry-count: 3
      max-retries: 3
      stuck-minutes: 10
      processing-timeout-minutes: 30
      pending-timeout-minutes: 30
      running-timeout-minutes: 60
      timeout-minutes: 30
      retry-delay-seconds: 60
      retry-interval-seconds: 60
      lock-enabled: false
      lock-key: video_transcode_compensation
      lock-lease-seconds: 120
      cron: "0 */1 * * * ?"

vspicy:
  member:
    url: http://localhost:18092

  # 兼容中间版本可能读取 vspicy.minio.*
