server:
  port: 18083
  max-http-request-header-size: ${VSPICY_MAX_HTTP_REQUEST_HEADER_SIZE:64KB}

spring:
  application:
    name: vspicy-file
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB
  datasource:
    url: ${VSPICY_DB_URL:jdbc:mysql://${VSPICY_DB_HOST:127.0.0.1}:${VSPICY_DB_PORT:3306}/${VSPICY_DB_NAME:vspicy}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000}
    username: ${VSPICY_DB_USERNAME:root}
    password: ${VSPICY_DB_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
      maximum-pool-size: 10
      minimum-idle: 2
  cloud:
    nacos:
      discovery:
        server-addr: ${VSPICY_NACOS_SERVER_ADDR:127.0.0.1:8848}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

vspicy:
  minio:
    endpoint: ${VSPICY_MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${VSPICY_MINIO_ACCESS_KEY:vspicy}
    secret-key: ${VSPICY_MINIO_SECRET_KEY:vspicy123456}
    bucket: ${VSPICY_MINIO_BUCKET:vspicy}
