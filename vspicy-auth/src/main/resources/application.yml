server:
  port: 18081

spring:
  application:
    name: vspicy-auth
  datasource:
    url: ${VSPICY_DB_URL:jdbc:mysql://${VSPICY_DB_HOST:127.0.0.1}:${VSPICY_DB_PORT:3306}/${VSPICY_DB_NAME:vspicy}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000}
    username: ${VSPICY_DB_USERNAME:vspicy}
    password: ${VSPICY_DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
      maximum-pool-size: 10
      minimum-idle: 2
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

vspicy:
  jwt:
    secret: ${VSPICY_JWT_SECRET:vspicy-local-dev-jwt-secret-2026-04-30}
    access-token-minutes: 720
    refresh-token-days: 7
