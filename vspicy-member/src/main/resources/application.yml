server:
  port: 18092

spring:
  application:
    name: vspicy-member
  datasource:
    url: ${VSPICY_DB_URL:jdbc:mysql://${VSPICY_DB_HOST:127.0.0.1}:${VSPICY_DB_PORT:3306}/${VSPICY_DB_NAME:vspicy}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000}
    username: ${VSPICY_DB_USERNAME:vspicy}
    password: ${VSPICY_DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${VSPICY_REDIS_PASSWORD:change_me}
      timeout: 3000ms
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

vspicy:
  member:
    cache:
      enabled: true
      membership-ttl-seconds: 1800
