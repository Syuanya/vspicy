server:
  port: 18091

spring:
  application:
    name: vspicy-notification
  datasource:
    url: ${VSPICY_DB_URL:jdbc:mysql://${VSPICY_DB_HOST:127.0.0.1}:${VSPICY_DB_PORT:3306}/${VSPICY_DB_NAME:vspicy}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000}
    username: ${VSPICY_DB_USERNAME:vspicy}
    password: ${VSPICY_DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
      maximum-pool-size: 10
      minimum-idle: 2
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: vspicy-notification-producer

vspicy:
  notification:
    mq:
      enabled: false
      fallback-to-sync: true
      topic: vspicy-notification-event-topic
      producer-group: vspicy-notification-producer
      consumer-group: vspicy-notification-consumer
      auto-retry-enabled: false
      retry-fixed-delay-ms: 60000
      retry-scan-limit: 20
      max-retry-count: 5
      retry-lock-enabled: true
      retry-lock-key: notification_event_auto_retry
      retry-lock-lease-seconds: 120
